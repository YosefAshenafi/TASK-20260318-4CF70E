services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pharmaops-api
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: development
      MYSQL_DSN: pharmaops:pharmaops@tcp(db:3306)/pharmaops?parseTime=true&loc=UTC&charset=utf8mb4
      FILE_STORAGE_ROOT: /var/lib/pharmaops/files
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - pharmaops_files:/var/lib/pharmaops/files
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  db:
    image: mysql:8.4
    container_name: pharmaops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pharmaops
      MYSQL_USER: pharmaops
      MYSQL_PASSWORD: pharmaops
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pharmaops-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  mysql_data:
  pharmaops_files:
