services:
  db:
    image: mysql:8.4
    container_name: pharmaops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pharmaops
      MYSQL_USER: pharmaops
      MYSQL_PASSWORD: pharmaops
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pharmaops-web
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  mysql_data:
